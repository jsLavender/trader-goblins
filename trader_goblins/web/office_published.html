let gobSheet = null;
if (GOB_SRC) { const im = new Image(); im.onload = ()=>{ gobSheet = im; }; im.src = GOB_SRC; }

function pix(x,y,w,h,c){ cx.fillStyle=c; cx.fillRect(x,y,w,h); }

// a chunky placeholder goblin facing the viewer, bobbing
function drawGoblin(gx, gy, mood, bob){
  const y = gy + bob;
  pix(gx-14, y-2, 8, 10, EAR); pix(gx+18, y-2, 8, 10, EAR);   // ears
  pix(gx-12, y, 24, 22, SKIN);                                 // head
  pix(gx-12, y+18, 24, 4, SKIN_D);                             // chin shade
  pix(gx-7, y+7, 5, 5, "#15171c"); pix(gx+4, y+7, 5, 5, "#15171c"); // eyes
  const m = mood;
  if (m==="gloat"||m==="happy") { pix(gx-6,y+15,14,3,"#15171c"); pix(gx-8,y+13,3,3,"#15171c"); pix(gx+7,y+13,3,3,"#15171c"); }
  else if (m==="panic"||m==="worried") { pix(gx-5,y+15,5,5,"#15171c"); pix(gx+2,y+15,5,5,"#15171c"); }
  else { pix(gx-6,y+16,14,3,"#15171c"); }                      // neutral line
  pix(gx-10, y+24, 20, 14, "#3b4a5a");                         // little body/suit
  pix(gx-3, y-6, 6, 4, MOOD[mood]);                            // mood pixel on top
}

function bubble(x, y, w, text){
  cx.fillStyle="#fbfbf5"; cx.strokeStyle="#15171c"; cx.lineWidth=2;
  roundRect(x, y, w, 38, 5, true, true);
  cx.fillStyle="#fbfbf5"; cx.beginPath(); cx.moveTo(x+w/2-6,y+38); cx.lineTo(x+w/2+6,y+38); cx.lineTo(x+w/2,y+46); cx.closePath(); cx.fill();
  cx.fillStyle="#15171c"; cx.font="11px 'Courier New',monospace"; cx.textAlign="left";
  wrap(text, x+8, y+15, w-16, 12, 2);
}
function roundRect(x,y,w,h,r,f,s){ cx.beginPath(); cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r); cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath(); if(f)cx.fill(); if(s)cx.stroke(); }
function wrap(t,x,y,maxw,lh,maxlines){ const words=t.split(' '); let line='',ln=0; for(const w of words){ const test=line+w+' '; if(cx.measureText(test).width>maxw && line){ cx.fillText(line.trim(),x,y); line=w+' '; if(++ln>=maxlines){cx.fillText('…',x+maxw-8,y);return;} y+=lh; } else line=test; } cx.fillText(line.trim(),x,y); }

function leaderboard(g){
  const x=690, y=60, w=156;
  cx.fillStyle="#222633"; cx.strokeStyle="#3a3f4b"; cx.lineWidth=2; roundRect(x,y,w,210,6,true,true);
  cx.fillStyle="#9aa0ad"; cx.font="bold 11px 'Courier New'"; cx.textAlign="left"; cx.fillText("FLOOR RANK",x+12,y+20);
  g.forEach((gob,i)=>{ const yy=y+40+i*32;
    cx.fillStyle="#e7e8ec"; cx.font="12px 'Courier New'"; cx.fillText((i+1)+". "+gob.name, x+12, yy);
    const r=gob.return, c=r>=0?"#7ed957":"#e0566a";
    cx.fillStyle=c; cx.font="bold 12px 'Courier New'"; cx.fillText((r>=0?"+":"")+(r*100).toFixed(1)+"%", x+12, yy+14);
  });
}

let frame=0;
function render(){
  frame++;
  cx.clearRect(0,0,cv.width,cv.height);
  // floor tiles
  for(let yy=40; yy<cv.height; yy+=40) for(let xx=0; xx<670; xx+=40){
    cx.fillStyle = ((xx/40+yy/40)%2) ? "#323748" : "#2c313f"; cx.fillRect(xx,yy,40,40);
  }
  pix(0,0,cv.width,38,"#222633");
  cx.fillStyle="#cfd3db"; cx.font="bold 13px 'Courier New'"; cx.textAlign="left";
  cx.fillText("● ● ●  trading floor", 14, 25);

  const g = (DATA&&DATA.goblins)||[];
  leaderboard(g);
  const cols=3, cw=213, ch=210, ox=30, oy=70;
  g.slice(0,6).forEach((gob,i)=>{
    const col=i%cols, row=(i/cols)|0; const x=ox+col*cw, y=oy+row*ch;
    const bob = Math.round(Math.sin((frame/22)+(i))*2);
    // desk
    pix(x-6, y+92, 150, 10, "#6b4f2e"); pix(x-6, y+102, 150, 26, "#5a4226");
    pix(x+96, y+70, 40, 24, "#15171c"); pix(x+100, y+74, 32, 16, "#2b6cb0"); // monitor
    const gi = (gob.sprite!=null) ? gob.sprite : GOBLIN_ORDER.indexOf(gob.name);
    if (gobSheet && gi>=0) { cx.drawImage(gobSheet, gi*32,0,32,32, x+8, y+8+bob, 64,64); pix(x+37, y+2+bob, 6,4, MOOD[gob.mood]); }
    else drawGoblin(x+40, y+44, gob.mood, bob);
    // nameplate + pnl
    cx.textAlign="center";
    cx.fillStyle=MOOD[gob.mood]; cx.fillRect(x+4, y+132, 132, 18);
    cx.fillStyle="#15171c"; cx.font="bold 12px 'Courier New'"; cx.fillText(gob.name.toUpperCase(), x+70, y+145);
    const r=gob.return, c=r>=0?"#7ed957":"#e0566a";
    cx.fillStyle=c; cx.font="bold 13px 'Courier New'"; cx.fillText((r>=0?"+":"")+(r*100).toFixed(1)+"%  $"+Math.round(gob.equity).toLocaleString(), x+70, y+166);
    cx.fillStyle="#8b909c"; cx.font="9px 'Courier New'"; cx.fillText(gob.style+(gob.contrarian?" · contrarian":""), x+70, y+180);
    if(gob.holdings&&gob.holdings.length){ cx.fillStyle="#6f7682"; cx.font="9px 'Courier New'"; cx.fillText("holds "+gob.holdings.slice(0,3).map(h=>(h.side==="short"?"-":"")+h.ticker).join(" "), x+70, y+192); }
    bubble(x-6, y-30, 175, gob.speech);
  });
  requestAnimationFrame(render);
}
render();
</script>
