<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Daily Gauntlet</title>
<style>
 :root{
  --bg:#faf9f5;--surface:#ffffff;--line:#e9e7df;--ink:#1f1e1b;--muted:#6b6a64;
  --faint:#9a988f;--accent:#5a8a3c;--chip:#f1efe8;
  --green:#5a8a3c;--yellow:#c9a227;--grey:#a8a69d;
  --c1:#e7c75b;--c2:#9fc356;--c3:#6aa6d6;--c4:#a986cf;}
 @media (prefers-color-scheme:dark){:root{
  --bg:#1a1916;--surface:#242320;--line:#34322d;--ink:#ecebe6;--muted:#a3a199;
  --faint:#6f6d65;--chip:#2c2b27;
  --green:#6fa84b;--yellow:#d6b13a;--grey:#56544d;}}
 *{box-sizing:border-box}
 html,body{margin:0}
 body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);
  color:var(--ink);max-width:560px;margin:0 auto;padding:0 1rem 3rem;line-height:1.5;
  -webkit-tap-highlight-color:transparent}
 a{color:var(--accent)}
 .topnav{position:sticky;top:0;z-index:30;background:var(--bg);
  margin:0 -1rem .6rem;padding:.55rem 1rem;border-bottom:1px solid var(--line)}
 .navrow{display:flex;align-items:center;gap:.5rem 1rem;flex-wrap:wrap}
 .brand{font-size:15px;font-weight:600;color:var(--ink);text-decoration:none}
 .tab{font-size:13px;color:var(--muted);text-decoration:none;padding:.3rem .7rem;border-radius:8px}
 .tab.on{background:var(--accent);color:#fff}

 /* theme header + rail */
 .hero{text-align:center;padding:.4rem 0 .2rem}
 .hero .em{font-size:34px;line-height:1}
 .hero h1{font-size:20px;margin:.1rem 0 0;letter-spacing:-.01em}
 .hero .th{color:var(--accent);font-weight:600}
 .rail{display:flex;justify-content:center;gap:.35rem;margin:.7rem 0 .3rem}
 .node{display:flex;flex-direction:column;align-items:center;gap:.2rem;flex:1;max-width:96px;
  text-decoration:none;color:var(--faint);font-size:10.5px;cursor:default}
 .node .dot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
  background:var(--chip);border:2px solid var(--line);font-size:15px;transition:.2s}
 .node.done .dot{background:var(--accent);border-color:var(--accent);color:#fff}
 .node.active .dot{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}
 .node.active{color:var(--ink);font-weight:600}
 .node.locked{opacity:.55}

 .stage{background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:1rem .9rem 1.15rem;margin-top:.5rem}
 .stage h2{font-size:15px;margin:0 0 .15rem;display:flex;align-items:center;gap:.4rem}
 .stage .blurb{color:var(--muted);font-size:12.5px;margin:0 0 .8rem}
 .center{text-align:center}
 .btn{font:inherit;font-size:14px;font-weight:600;border:none;border-radius:10px;padding:.6rem 1.2rem;
  background:var(--accent);color:#fff;cursor:pointer}
 .btn:disabled{opacity:.4;cursor:default}
 .btn.ghost{background:var(--chip);color:var(--ink);border:1px solid var(--line)}

 /* handoff banner */
 .handoff{background:color-mix(in srgb,var(--accent) 12%,var(--surface));
  border:1px dashed var(--accent);border-radius:12px;padding:.7rem .8rem;margin:.6rem 0;
  font-size:13px;display:flex;gap:.5rem;align-items:flex-start}
 .handoff .em{font-size:18px}

 /* WORDLE */
 .wgrid{display:grid;grid-template-rows:repeat(6,1fr);gap:5px;width:min(100%,300px);margin:0 auto .7rem}
 .wrow{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
 .wtile{aspect-ratio:1;display:grid;place-items:center;font-size:18px;font-weight:700;text-transform:uppercase;
  border:2px solid var(--line);border-radius:6px;color:var(--ink)}
 .wtile.filled{border-color:var(--faint)}
 .wtile.green{background:var(--green);border-color:var(--green);color:#fff}
 .wtile.yellow{background:var(--yellow);border-color:var(--yellow);color:#fff}
 .wtile.grey{background:var(--grey);border-color:var(--grey);color:#fff}

 /* shared on-screen keyboard */
 .kb{display:flex;flex-direction:column;gap:5px;max-width:380px;margin:0 auto}
 .kbrow{display:flex;justify-content:center;gap:4px}
 .key{font:inherit;font-weight:600;font-size:12.5px;border:none;border-radius:6px;background:var(--chip);
  color:var(--ink);height:44px;min-width:26px;flex:1;cursor:pointer;text-transform:uppercase}
 .key.wide{flex:1.5;font-size:11px}
 .key.green{background:var(--green);color:#fff}
 .key.yellow{background:var(--yellow);color:#fff}
 .key.grey{background:var(--grey);color:#fff}

 /* SPELLING BEE */
 .bee-input{height:30px;text-align:center;font-size:20px;font-weight:700;text-transform:uppercase;
  letter-spacing:2px;margin:.2rem 0}
 .bee-input .cur{border-bottom:2px solid var(--accent)}
 .hive{width:230px;margin:.4rem auto;position:relative;height:210px}
 .cell{position:absolute;width:64px;height:72px;left:50%;top:50%;cursor:pointer;
  clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
  background:var(--chip);display:grid;place-items:center;font-size:22px;font-weight:700;
  transform:translate(-50%,-50%);transition:transform .08s}
 .cell.mid{background:var(--accent);color:#fff;z-index:2}
 .cell.bonus{background:color-mix(in srgb,var(--accent) 26%,var(--chip))}
 .cell:active{transform:translate(-50%,-50%) scale(.92)}

 /* UNEARTH */
 .un-card{border:1px solid var(--line);border-radius:12px;padding:.7rem;margin:.5rem 0}
 .un-clue{font-size:13px;margin:0 0 .55rem}
 .un-slots{display:flex;gap:5px;justify-content:center;margin-bottom:.55rem}
 .un-slot{width:38px;height:42px;border:2px dashed var(--line);border-radius:6px;display:grid;place-items:center;
  font-size:18px;font-weight:700;text-transform:uppercase}
 .un-slot.filled{border-style:solid;border-color:var(--faint)}
 .un-slot.key{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 18%,transparent)}
 .un-bank{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
 .un-tile{width:38px;height:42px;border-radius:6px;background:var(--chip);display:grid;place-items:center;
  font-size:18px;font-weight:700;cursor:pointer;text-transform:uppercase;transition:transform .08s}
 .un-tile:active{transform:scale(.92)}
 .un-tile.used{opacity:.25;pointer-events:none}
 .un-solved{color:var(--accent);font-weight:600;font-size:13px;text-align:center;margin:.4rem 0 0}
 .choice{margin-top:.9rem;border-top:1px solid var(--line);padding-top:.8rem}
 .choice-q{font-size:13px;text-align:center;margin:0 0 .6rem;color:var(--ink)}
 .choice-row{display:flex;justify-content:center;gap:1rem}
 .choice-lt{font:inherit;font-weight:800;font-size:30px;width:72px;height:80px;cursor:pointer;color:var(--ink);
  clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);border:none;
  background:var(--chip);transition:transform .1s,background .1s}
 .choice-lt:hover{background:color-mix(in srgb,var(--accent) 30%,var(--chip));transform:scale(1.06)}
 .tray{display:flex;gap:.4rem;justify-content:center;align-items:center;margin:.3rem 0 .5rem;font-size:13px;color:var(--muted)}
 .tray .lt{width:30px;height:34px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;
  font-weight:700;color:var(--faint)}
 .tray .lt.got{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--ink)}
 .bee-controls{display:flex;justify-content:center;gap:.5rem;margin-top:.3rem}
 .progressbar{height:8px;background:var(--chip);border-radius:5px;margin:.5rem 0 .2rem;overflow:hidden}
 .progressbar > i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s}
 .rank{font-size:12px;color:var(--muted);text-align:center}
 .found{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem;justify-content:center}
 .found span{font-size:12px;background:var(--chip);border-radius:6px;padding:.15rem .45rem;text-transform:lowercase}
 .found span.pan{background:var(--yellow);color:#fff;font-weight:700}

 /* CONNECTIONS */
 .cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:.4rem 0 .6rem}
 .ctile{aspect-ratio:1.35;display:grid;place-items:center;text-align:center;border-radius:8px;
  background:var(--chip);font-size:11px;font-weight:700;text-transform:uppercase;cursor:pointer;
  padding:2px;user-select:none;transition:transform .08s}
 .ctile.sel{background:var(--ink);color:var(--bg)}
 .ctile:active{transform:scale(.95)}
 .solved{grid-column:1/-1;border-radius:8px;padding:.5rem;text-align:center;color:#3a3a2a}
 .solved b{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
 .solved span{font-size:12px}
 .lives{display:flex;justify-content:center;gap:.4rem;align-items:center;font-size:12px;color:var(--muted)}
 .lives .pip{width:9px;height:9px;border-radius:50%;background:var(--accent)}
 .lives .pip.gone{background:var(--line)}
 .cbtns{display:flex;justify-content:center;gap:.5rem;margin-top:.6rem}

 /* CROSSWORD */
 .cw-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem}
 .cw{display:grid;gap:2px;background:var(--ink);border:2px solid var(--ink);border-radius:4px}
 .cwc{width:46px;height:46px;background:var(--surface);position:relative;display:grid;place-items:center;
  font-size:20px;font-weight:700;text-transform:uppercase;cursor:pointer}
 .cwc.hl{background:color-mix(in srgb,var(--yellow) 35%,var(--surface))}
 .cwc.cur{background:color-mix(in srgb,var(--accent) 30%,var(--surface))}
 .cwc .n{position:absolute;top:1px;left:2px;font-size:9px;font-weight:600;color:var(--muted)}
 .cwc.bad{color:#c0392b}
 .clue-now{font-size:13px;text-align:center;min-height:34px;background:var(--chip);
  border-radius:8px;padding:.4rem .6rem;width:100%}
 .clue-now b{color:var(--accent)}

 .finale{text-align:center;padding:1.4rem .5rem}
 .finale .em{font-size:48px}
 .finale h2{margin:.3rem 0}
 .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--ink);color:var(--bg);
  padding:.55rem .9rem;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
 .toast.show{opacity:.95}
 .hidden{display:none!important}
</style>
</head>
<body>
<nav class="topnav"><div class="navrow">
 <a class="brand" href="/">&#128122; John Lavender</a>
 <a class="tab" href="/games">&larr; Arcade</a>
 <a class="tab on" href="#">Daily Gauntlet</a>
</div></nav>

<div class="hero">
 <div class="em" id="hero-em">🌱</div>
 <h1>Today’s theme: <span class="th" id="hero-theme">…</span></h1>
</div>

<div class="rail" id="rail"></div>
<div id="stage"></div>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
const STAGES = ["wordle","unearth","bee","connections","crossword"];
const LABELS  = {wordle:"Wordle", unearth:"Unearth", bee:"Spelling Bee", connections:"Connections", crossword:"Crossword"};
const ICONS   = {wordle:"🟩", unearth:"⛏️", bee:"🐝", connections:"🔗", crossword:"✏️"};
const SKEY = "tg_gauntlet";   // tg_ prefix => never namespaced by the arcade shell
const $ = (s,r)=>(r||document).querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const stageEl = $("#stage");
let DAY=null, prog=null;

function load(){ try{return JSON.parse(localStorage.getItem(SKEY))||{};}catch(e){return {};} }
function save(){ localStorage.setItem(SKEY, JSON.stringify(prog)); }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1600); }

function reachedIdx(){ // first not-done stage
  for(let i=0;i<STAGES.length;i++) if(!prog.done[STAGES[i]]) return i;
  return STAGES.length-1;
}
function renderRail(){
  const rail=$("#rail"); rail.innerHTML=""; const cur=reachedIdx();
  STAGES.forEach((s,i)=>{
    const done=prog.done[s], active=(i===cur)&&!done;
    const n=el("a","node "+(done?"done":active?"active":(i>cur?"locked":"")));
    n.innerHTML=`<span class="dot">${done?"✓":ICONS[s]}</span><span>${LABELS[s]}</span>`;
    if(done||active){ n.href="#"; n.style.cursor="pointer";
      n.onclick=(e)=>{e.preventDefault(); openStage(i);}; }
    rail.appendChild(n);
  });
}

function completeStage(s, handoff){
  prog.done[s]=true; save(); renderRail();
  const idx=STAGES.indexOf(s);
  if(idx<STAGES.length-1){ openStage(idx+1, handoff); }
  else { renderFinale(); }
}

function openStage(i, handoff){
  const s=STAGES[i];
  stageEl.innerHTML="";
  const wrap=el("div","stage");
  stageEl.appendChild(wrap);
  if(handoff){
    const h=el("div","handoff",`<span class="em">↳</span><span>${handoff}</span>`);
    wrap.appendChild(h);
  }
  ({wordle:mountWordle, unearth:mountUnearth, bee:mountBee, connections:mountConnections, crossword:mountCrossword})[s](wrap, i);
  if(window.scrollY>0) wrap.scrollIntoView({behavior:"smooth",block:"start"});
}

/* ───────────────────────── WORDLE ───────────────────────── */
function mountWordle(wrap){
  const ans=DAY.wordle.answer.toUpperCase(), N=ans.length, ROWS=6;
  wrap.appendChild(el("h2",null,`🟩 Wordle <span style="font-weight:400;color:var(--muted);font-size:12px">&nbsp;${N} letters · 6 tries</span>`));
  wrap.appendChild(el("p","blurb","Guess the hidden word. The letters you uncover become the hive."));
  const grid=el("div","wgrid"); grid.style.maxWidth=(N*52)+"px";
  const tiles=[];
  for(let r=0;r<ROWS;r++){ const row=el("div","wrow"); row.style.gridTemplateColumns=`repeat(${N},1fr)`;
    const tr=[]; for(let c=0;c<N;c++){const t=el("div","wtile"); row.appendChild(t); tr.push(t);} tiles.push(tr); grid.appendChild(row);}
  wrap.appendChild(grid);
  const kb=buildKeyboard(wrap, onKey);
  let row=0, col=0, over=false; const keyState={};

  function onKey(k){
    if(over) return;
    if(k==="ENTER"){ submit(); return; }
    if(k==="DEL"){ if(col>0){col--; tiles[row][col].textContent=""; tiles[row][col].classList.remove("filled");} return; }
    if(/^[A-Z]$/.test(k) && col<N){ tiles[row][col].textContent=k; tiles[row][col].classList.add("filled"); col++; }
  }
  function submit(){
    if(col<N){ toast("Not enough letters"); return; }
    const guess=tiles[row].map(t=>t.textContent).join("");
    // score
    const res=new Array(N).fill("grey"); const pool={};
    for(let i=0;i<N;i++){ if(guess[i]===ans[i]){res[i]="green";} else {pool[ans[i]]=(pool[ans[i]]||0)+1;} }
    for(let i=0;i<N;i++){ if(res[i]==="green")continue; if(pool[guess[i]]>0){res[i]="yellow"; pool[guess[i]]--;} }
    for(let i=0;i<N;i++){ const t=tiles[row][i]; t.classList.add(res[i]);
      const cur=keyState[guess[i]]; const rank={grey:0,yellow:1,green:2};
      if(!cur||rank[res[i]]>rank[cur]){ keyState[guess[i]]=res[i]; paintKey(guess[i],res[i]); } }
    if(guess===ans){ over=true; setTimeout(win,350); return; }
    row++; col=0;
    if(row>=ROWS){ over=true; revealAnswer(); }
  }
  function revealAnswer(){
    const last=tiles[ROWS-1]; for(let i=0;i<N;i++){last[i].textContent=ans[i]; last[i].className="wtile green";}
    toast("The word was "+ans);
    setTimeout(win,700);
  }
  function win(){
    kb.remove();
    const done=el("div","center");
    done.appendChild(el("p",null,`<b style="font-size:18px;letter-spacing:3px">${ans}</b>`));
    const b=el("button","btn",`Open the hive →`); b.onclick=()=>completeStage("wordle", DAY.wordle.handoff);
    done.appendChild(b); wrap.appendChild(done);
  }
  function paintKey(k,st){ const btn=kb.querySelector(`[data-k="${k}"]`); if(!btn)return; btn.classList.remove("green","yellow","grey"); btn.classList.add(st); }
}

function buildKeyboard(wrap, handler){
  const rows=["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"];
  const kb=el("div","kb");
  rows.forEach((r,ri)=>{ const row=el("div","kbrow");
    if(ri===2){ const e=el("button","key wide","Enter"); e.dataset.k="ENTER"; e.onclick=()=>handler("ENTER"); row.appendChild(e); }
    r.split("").forEach(ch=>{ const b=el("button","key",ch); b.dataset.k=ch; b.onclick=()=>handler(ch); row.appendChild(b); });
    if(ri===2){ const d=el("button","key wide","⌫"); d.dataset.k="DEL"; d.onclick=()=>handler("DEL"); row.appendChild(d); }
    kb.appendChild(row);
  });
  wrap.appendChild(kb);
  const phys=(e)=>{ let k=e.key.toUpperCase(); if(k==="BACKSPACE")k="DEL"; if(k==="ENTER"||k==="DEL"||/^[A-Z]$/.test(k)){handler(k);} };
  document.addEventListener("keydown", phys); kb._phys=phys;
  const obs=new MutationObserver(()=>{ if(!document.body.contains(kb)){document.removeEventListener("keydown",phys); obs.disconnect();} });
  obs.observe(document.body,{childList:true,subtree:true});
  return kb;
}

/* ───────────────────────── UNEARTH (anagram digs) ───────────────────────── */
function mountUnearth(wrap){
  const U=DAY.unearth, puzzles=U.puzzles;
  wrap.appendChild(el("h2",null,`⛏️ Unearth <span style="font-weight:400;color:var(--muted);font-size:12px">&nbsp;2 bonus letters</span>`));
  wrap.appendChild(el("p","blurb",U.intro));
  // tray of awarded letters
  const tray=el("div","tray","Joining the hive: ");
  const trayLts=puzzles.map(p=>{ const k=el("div","lt","?"); tray.appendChild(k); return k; });
  wrap.appendChild(tray);
  let solvedCount=0;
  puzzles.forEach((p,pi)=>{
    const ans=p.answer.toUpperCase(), keyLt=ans[p.key];
    const card=el("div","un-card");
    card.appendChild(el("p","un-clue",`<b>${pi+1}.</b> ${p.clue} <span style="color:var(--faint)">(${ans.length})</span>`));
    const slotRow=el("div","un-slots"); const slots=[];
    for(let i=0;i<ans.length;i++){ const sl=el("div","un-slot"+(i===p.key?" key":"")); slotRow.appendChild(sl); slots.push(sl); }
    card.appendChild(slotRow);
    const bank=el("div","un-bank"); const tiles=[];
    const scrambled=shuffleSeeded(ans.split(""), 13+pi*5);
    scrambled.forEach((ch,i)=>{ const t=el("div","un-tile",ch); t._ch=ch; bank.appendChild(t); tiles.push(t); });
    card.appendChild(bank); wrap.appendChild(card);
    let placed=[];   // {tile, slotIdx}
    function refresh(){
      slots.forEach((s,i)=>{ const p2=placed.find(x=>x.slotIdx===i);
        s.textContent=p2?p2.tile._ch:""; s.classList.toggle("filled",!!p2); });
    }
    tiles.forEach(t=>{ t.onclick=()=>{ if(t.classList.contains("used"))return;
      const next=placed.length; if(next>=ans.length)return;
      t.classList.add("used"); placed.push({tile:t,slotIdx:next}); refresh();
      if(placed.length===ans.length) checkWord(); }; });
    slots.forEach((s,i)=>{ s.onclick=()=>{ const idx=placed.findIndex(x=>x.slotIdx===i); if(idx<0)return;
      placed[idx].tile.classList.remove("used"); placed.splice(idx,1);
      placed.forEach((x,j)=>x.slotIdx=j); refresh(); }; });
    function checkWord(){
      const guess=placed.sort((a,b)=>a.slotIdx-b.slotIdx).map(x=>x.tile._ch).join("");
      if(guess===ans){
        bank.remove();
        const ok=el("p","un-solved",`✓ ${ans} — the ${keyLt} drops into the hive`);
        card.appendChild(ok);
        slots[p.key].classList.add("key"); slots[p.key].textContent=keyLt;
        trayLts[pi].textContent=keyLt; trayLts[pi].classList.add("got");
        solvedCount++; if(solvedCount===puzzles.length) finish();
      } else {
        toast("Not it — try again"); placed.forEach(x=>x.tile.classList.remove("used")); placed=[]; refresh();
      }
    }
  });
  function finish(){
    const candidates=puzzles.map(p=>p.answer.toUpperCase()[p.key]);   // [S, T]
    const ch=el("div","choice");
    ch.appendChild(el("p","choice-q",U.choicePrompt||"Plant one letter."));
    const row=el("div","choice-row");
    candidates.forEach(L=>{ const b=el("button","choice-lt",L);
      b.onclick=()=>{ prog.choice=L; save();
        completeStage("unearth", `You planted <b>${L}</b>. Seven letters now — a full flower.`); };
      row.appendChild(b); });
    ch.appendChild(row); wrap.appendChild(ch);
    ch.scrollIntoView({behavior:"smooth",block:"nearest"});
  }
}

/* ───────────────────────── SPELLING BEE ───────────────────────── */
function mountBee(wrap){
  const B=DAY.bee, center=B.center.toUpperCase();
  const P0=DAY.unearth.puzzles[0];
  const wordleLetters=[...new Set(DAY.wordle.answer.toUpperCase().split(""))];
  const chosen=(prog.choice||P0.answer.toUpperCase()[P0.key]).toUpperCase();   // the planted 7th letter
  const letters=[...new Set([...wordleLetters, chosen])];                       // exactly 7
  const set7=new Set(letters);
  const buildable=w=>w.split("").every(ch=>set7.has(ch));
  const valid=new Set(B.words.map(w=>w.toUpperCase()).filter(w=>w.includes(center)&&buildable(w)));
  const isPangram=w=>(new Set(w).size===letters.length)&&buildable(w);          // uses all 7
  const target=B.target||Math.ceil(valid.size*0.45);
  wrap.appendChild(el("h2",null,`🐝 Spelling Bee`));
  wrap.appendChild(el("p","blurb",`Every word uses the center letter <b>${center}</b>. The outlined tile is the letter you planted (<b>${chosen}</b>). Find <b>${target}</b> to open the gate; a pangram uses all seven.`));
  const inp=el("div","bee-input"); wrap.appendChild(inp);
  const hive=el("div","hive");
  // gap-free 7-cell flower (2-3-2): centre + 6 petals, pointy-top hexes.
  const W=62, H=54;
  const centerPos=[0,0];
  const slots=[[-W/2,-H],[W/2,-H],[-W,0],[W,0],[-W/2,H],[W/2,H]];   // 6 petals
  const bonus=new Set([chosen]);
  const others=letters.filter(l=>l!==center);                       // 6 petal letters
  let shuffleOrder=others.slice();
  function drawHive(){
    hive.innerHTML="";
    const mk=(l,x,y,cls)=>{ const c=el("div","cell"+cls,l);
      c.style.left=`calc(50% + ${x}px)`; c.style.top=`calc(50% + ${y}px)`; c.onclick=()=>add(l); hive.appendChild(c); };
    mk(center, centerPos[0], centerPos[1], " mid");
    shuffleOrder.forEach((l,i)=>{ const[x,y]=slots[i]; mk(l,x,y, bonus.has(l)?" bonus":""); });
  }
  wrap.appendChild(hive); drawHive();
  const ctr=el("div","bee-controls");
  const del=el("button","btn ghost","Delete"); const sh=el("button","btn ghost","↻ Shuffle"); const ent=el("button","btn","Enter");
  ctr.append(del,sh,ent); wrap.appendChild(ctr);
  const bar=el("div","progressbar","<i></i>"); wrap.appendChild(bar);
  const rank=el("div","rank"); wrap.appendChild(rank);
  const foundWrap=el("div","found"); wrap.appendChild(foundWrap);

  let cur=""; const found=new Set();
  function render(){ inp.innerHTML = cur.split("").map(ch=>letters.includes(ch)?`<span>${ch}</span>`:`<span style="color:var(--faint)">${ch}</span>`).join("")+'<span class="cur">&nbsp;</span>'; }
  function add(l){ cur+=l; render(); }
  del.onclick=()=>{ cur=cur.slice(0,-1); render(); };
  sh.onclick=()=>{ shuffleOrder=shuffleSeeded(shuffleOrder, cur.length+found.size); drawHive(); };
  ent.onclick=submit;
  function submit(){
    const w=cur.toUpperCase(); cur=""; render();
    if(w.length<4){ toast("Too short"); return; }
    if(!w.includes(center)){ toast("Missing center letter"); return; }
    if(found.has(w)){ toast("Already found"); return; }
    if(!valid.has(w)){ toast("Not in word list"); return; }
    found.add(w);
    const pan=isPangram(w);
    const tag=el("span",pan?"pan":null,w); foundWrap.appendChild(tag);
    toast(pan?"Pangram! 🎉":"+"+w.length);
    update();
  }
  function update(){
    const pct=Math.min(100, Math.round(found.size/target*100));
    $("i",bar).style.width=pct+"%";
    rank.textContent = found.size>=target ? "Gate open ✓" : `${found.size} / ${target} words`;
    if(found.size>=target && !$(".btn.unlock",wrap)){
      const b=el("button","btn unlock","To the beds →"); b.style.marginTop=".6rem"; b.style.display="block"; b.style.margin=".6rem auto 0";
      b.onclick=()=>completeStage("bee", DAY.bee.handoff); wrap.appendChild(b);
    }
  }
  render(); update();
  const phys=(e)=>{ let k=e.key.toUpperCase(); if(k==="BACKSPACE"){cur=cur.slice(0,-1);render();}
    else if(k==="ENTER")submit(); else if(/^[A-Z]$/.test(k)&&letters.includes(k))add(k); };
  document.addEventListener("keydown",phys);
  const obs=new MutationObserver(()=>{ if(!document.body.contains(hive)){document.removeEventListener("keydown",phys); obs.disconnect();} });
  obs.observe(document.body,{childList:true,subtree:true});
}
function shuffleSeeded(arr, seed){ const a=arr.slice(); let s=seed*9301+49297;
  for(let i=a.length-1;i>0;i--){ s=(s*9301+49297)%233280; const j=Math.floor(s/233280*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ───────────────────────── CONNECTIONS ───────────────────────── */
function mountConnections(wrap){
  const groups=DAY.connections.groups.map((g,i)=>({...g, color:["var(--c1)","var(--c2)","var(--c3)","var(--c4)"][ (g.level||i+1)-1 ]}));
  wrap.appendChild(el("h2",null,`🔗 Connections`));
  wrap.appendChild(el("p","blurb","Sort the sixteen words into four secret groups of four."));
  const solvedWrap=el("div"); wrap.appendChild(solvedWrap);
  const grid=el("div","cgrid"); wrap.appendChild(grid);
  const lives=el("div","lives"); wrap.appendChild(lives);
  const btns=el("div","cbtns");
  const deselect=el("button","btn ghost","Deselect"); const submit=el("button","btn","Submit"); submit.disabled=true;
  btns.append(deselect,submit); wrap.appendChild(btns);

  let pool=[]; groups.forEach(g=>g.words.forEach(w=>pool.push({w:w.toUpperCase(),g})));
  pool=shuffleSeeded(pool, 7);
  let mistakes=0; const solved=[]; let sel=[];
  function drawLives(){ lives.innerHTML="Mistakes left: "; for(let i=0;i<4;i++){const p=el("span","pip"+(i<mistakes?" gone":"")); lives.appendChild(p);} }
  function drawGrid(){
    grid.innerHTML="";
    pool.forEach(item=>{ const t=el("div","ctile"+(sel.includes(item)?" sel":""), item.w);
      t.onclick=()=>{ const k=sel.indexOf(item);
        if(k>=0)sel.splice(k,1); else if(sel.length<4)sel.push(item);
        submit.disabled=sel.length!==4; drawGrid(); };
      grid.appendChild(t); });
  }
  function drawSolved(){
    solvedWrap.innerHTML="";
    solved.forEach(g=>{ const s=el("div","solved"); s.style.background=g.color;
      s.innerHTML=`<b>${g.emoji||""} ${g.name}</b><span>${g.words.join(", ")}</span>`; solvedWrap.appendChild(s); });
  }
  deselect.onclick=()=>{ sel=[]; submit.disabled=true; drawGrid(); };
  submit.onclick=()=>{
    const g=sel[0].g; const all=sel.every(x=>x.g===g);
    if(all){
      solved.push(g); pool=pool.filter(x=>x.g!==g); sel=[]; submit.disabled=true;
      drawSolved(); drawGrid();
      if(solved.length===4) finishWin();
    } else {
      const cnt={}; sel.forEach(x=>cnt[x.g.name]=(cnt[x.g.name]||0)+1);
      const near=Math.max(...Object.values(cnt))===3;
      mistakes++; drawLives(); toast(near?"One away…":"Not a group");
      sel=[]; submit.disabled=true; drawGrid();
      if(mistakes>=4) finishLose();
    }
  };
  function finishWin(){ btns.remove(); const b=el("button","btn","To the gate →"); b.style.margin=".6rem auto 0"; b.style.display="block";
    b.onclick=()=>completeStage("connections", DAY.connections.handoff); wrap.appendChild(b); }
  function finishLose(){ // reveal then allow continue (home-game friendly)
    groups.forEach(g=>{ if(!solved.includes(g)) solved.push(g); }); pool=[]; drawSolved(); drawGrid();
    btns.remove(); toast("Here’s the solution"); const b=el("button","btn","To the gate →"); b.style.margin=".6rem auto 0"; b.style.display="block";
    b.onclick=()=>completeStage("connections", DAY.connections.handoff); wrap.appendChild(b);
  }
  drawLives(); drawGrid();
}

/* ───────────────────────── CROSSWORD ───────────────────────── */
function mountCrossword(wrap){
  const C=DAY.crossword, n=C.size, sol=C.grid.map(r=>r.map(c=>c.toUpperCase()));
  wrap.appendChild(el("h2",null,`✏️ Mini Crossword`));
  wrap.appendChild(el("p","blurb","The final knot. Fill every square to finish."));
  // numbering
  const num=Array.from({length:n},()=>Array(n).fill(0)); let k=1;
  const acrossOf={}, downOf={};
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    const startA=(c===0)|| false, startD=(r===0)|| false; // full square: across starts at col0, down at row0
    if((c===0)||(r===0)){ num[r][c]=k; if(c===0)acrossOf[k]={r,c}; if(r===0)downOf[k]={r,c}; k++; }
  }
  const wrapcw=el("div","cw-wrap");
  const clueNow=el("div","clue-now");
  const cw=el("div","cw"); cw.style.gridTemplateColumns=`repeat(${n},46px)`;
  const cells=Array.from({length:n},()=>Array(n));
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    const cell=el("div","cwc"); if(num[r][c])cell.appendChild(el("span","n",num[r][c]));
    const inp=el("span"); inp.textContent=""; cell.appendChild(inp); cell._inp=inp;
    cell.onclick=()=>{ if(cur.r===r&&cur.c===c){dir=dir==="A"?"D":"A";} cur={r,c}; render(); };
    cw.appendChild(cell); cells[r][c]=cell;
  }
  wrapcw.append(cw, clueNow); wrap.appendChild(wrapcw);
  const kb=buildKeyboard(wrap, onKey);

  let cur={r:0,c:0}, dir="A";
  function clueFor(r,c,d){
    if(d==="A"){ let cc=c; while(cc>0)cc--; const nn=num[r][0]; return C.across[nn]?{n:nn,text:C.across[nn]}:null; }
    else { const nn=num[0][c]; return C.down[nn]?{n:nn,text:C.down[nn]}:null; }
  }
  function render(){
    for(let r=0;r<n;r++)for(let c=0;c<n;c++) cells[r][c].classList.remove("hl","cur");
    // highlight current word
    if(dir==="A"){ for(let c=0;c<n;c++) cells[cur.r][c].classList.add("hl"); }
    else { for(let r=0;r<n;r++) cells[r][cur.c].classList.add("hl"); }
    cells[cur.r][cur.c].classList.add("cur");
    const cl=clueFor(cur.r,cur.c,dir);
    clueNow.innerHTML = cl?`<b>${cl.n} ${dir==="A"?"Across":"Down"}.</b> ${cl.text}`:"";
  }
  function advance(){ if(dir==="A"){ if(cur.c<n-1)cur.c++; } else { if(cur.r<n-1)cur.r++; } }
  function onKey(key){
    if(key==="DEL"){ const cell=cells[cur.r][cur.c]; if(cell._inp.textContent){cell._inp.textContent="";cell.classList.remove("bad");}
      else { if(dir==="A"&&cur.c>0)cur.c--; else if(dir==="D"&&cur.r>0)cur.r--; cells[cur.r][cur.c]._inp.textContent=""; } render(); return; }
    if(key==="ENTER"){ dir=dir==="A"?"D":"A"; render(); return; }
    if(/^[A-Z]$/.test(key)){ cells[cur.r][cur.c]._inp.textContent=key; cells[cur.r][cur.c].classList.remove("bad"); advance(); render(); check(); }
  }
  function check(){
    let full=true, ok=true;
    for(let r=0;r<n;r++)for(let c=0;c<n;c++){ const v=cells[r][c]._inp.textContent; if(!v){full=false;} else if(v!==sol[r][c]){ok=false;} }
    if(full){ if(ok){ win(); } else { // mark wrong cells softly
      for(let r=0;r<n;r++)for(let c=0;c<n;c++){ const v=cells[r][c]._inp.textContent; cells[r][c].classList.toggle("bad", v&&v!==sol[r][c]); }
      toast("Something’s off"); } }
  }
  function win(){ kb.remove(); for(let r=0;r<n;r++)for(let c=0;c<n;c++)cells[r][c].classList.remove("bad","hl","cur");
    const b=el("button","btn","Complete the gauntlet →"); b.style.margin=".8rem auto 0"; b.style.display="block";
    b.onclick=()=>completeStage("crossword", null); wrapcw.appendChild(b); }
  render();
}

/* ───────────────────────── FINALE ───────────────────────── */
function renderFinale(){
  stageEl.innerHTML="";
  const f=el("div","stage finale");
  f.innerHTML=`<div class="em">${DAY.emoji}</div><h2>${DAY.theme} complete</h2>
   <p style="color:var(--muted);font-size:13.5px">${DAY.crossword.finale||""}</p>`;
  const row=el("div"); row.style.marginTop=".6rem";
  const a=el("a","btn","Back to the arcade"); a.href="/games"; a.style.textDecoration="none";
  row.appendChild(a); f.appendChild(row);
  const rep=el("button","btn ghost","Play again"); rep.style.marginTop=".5rem";
  rep.onclick=()=>{ prog={slot:prog.slot, done:{}}; save(); renderRail(); openStage(0); };
  f.appendChild(rep);
  stageEl.appendChild(f);
}

/* ───────────────────────── BOOT ───────────────────────── */
fetch("pack.json").then(r=>r.json()).then(pack=>{
  const days=pack.days, qs=new URLSearchParams(location.search), wrap=i=>((i%days.length)+days.length)%days.length;
  // `slot` identifies THIS playthrough so progress resumes within a day but each
  // calendar day starts fresh — even when a theme recurs (the rotation repeats every
  // days.length days, so keying on theme id would wrongly show an old finished day).
  let slot;
  if(qs.get("day")){ DAY=days.find(d=>d.id===qs.get("day"))||days[0]; slot="day:"+DAY.id; }
  else if(qs.get("n")!=null){ const idx=wrap(+qs.get("n")); DAY=days[idx]; slot="n:"+idx; }
  else { const epochDays=Math.floor(Date.now()/86400000); DAY=days[wrap(epochDays)]; slot="date:"+epochDays; }
  document.documentElement.style.setProperty("--accent", DAY.accent||"#5a8a3c");
  $("#hero-em").textContent=DAY.emoji;
  $("#hero-theme").textContent=DAY.theme;
  const saved=load();
  prog = (saved.slot===slot) ? saved : {slot, done:{}};
  if(!prog.done) prog.done={};
  save(); renderRail();
  if(STAGES.every(s=>prog.done[s])) renderFinale(); else openStage(reachedIdx());
}).catch(e=>{ stageEl.innerHTML=`<div class="stage">Couldn’t load today’s puzzle. (${e})</div>`; });
})();
</script>
